<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mally The Barber · Admin</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080808;
      --surface: #101010;
      --card: #161616;
      --gold: #C9A455;
      --gold-light: #E5C97A;
      --gold-dim: rgba(201,164,85,0.12);
      --white: #FFFFFF;
      --off-white: #E8E8E8;
      --gray: #777777;
      --border: #1C1C1C;
      --danger: #E05555;
      --success: #4CAF82;
      --radius: 8px;
    }
    html { font-size: 16px; }
    body { background: var(--bg); color: var(--white); font-family: 'Inter', sans-serif; min-height: 100vh; -webkit-font-smoothing: antialiased; }

    /* ─── LOGIN SCREEN ─── */
    #loginScreen {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 20px;
    }
    .login-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%; max-width: 400px;
      text-align: center;
    }
    .login-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 32px; letter-spacing: 0.1em;
      margin-bottom: 8px;
    }
    .login-logo span { color: var(--gold); }
    .login-sub {
      font-size: 12px; letter-spacing: 0.25em; text-transform: uppercase;
      color: var(--gray); margin-bottom: 36px;
    }
    .login-field {
      width: 100%; padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--white); font-size: 15px; font-family: 'Inter', sans-serif;
      outline: none; transition: border-color 0.2s;
      margin-bottom: 16px;
    }
    .login-field:focus { border-color: var(--gold); }
    .login-btn {
      width: 100%; padding: 14px;
      background: var(--gold); color: var(--bg);
      border: none; border-radius: var(--radius);
      font-size: 12px; letter-spacing: 0.25em; text-transform: uppercase;
      font-weight: 600; font-family: 'Inter', sans-serif;
      cursor: pointer; transition: background 0.2s, transform 0.15s;
    }
    .login-btn:hover { background: var(--gold-light); transform: translateY(-1px); }
    .login-error {
      margin-top: 12px; font-size: 13px; color: var(--danger);
      display: none;
    }
    .login-error.show { display: block; }

    /* ─── ADMIN PANEL ─── */
    #adminPanel { display: none; min-height: 100vh; }

    /* NAV */
    .admin-nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 clamp(16px, 4vw, 40px);
      height: 64px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 50;
    }
    .admin-nav-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px; letter-spacing: 0.1em;
    }
    .admin-nav-logo span { color: var(--gold); }
    .admin-nav-right { display: flex; align-items: center; gap: 16px; }
    .admin-badge {
      font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase;
      background: var(--gold-dim);
      border: 1px solid rgba(201,164,85,0.3);
      color: var(--gold); padding: 4px 10px; border-radius: 20px;
    }
    .logout-btn {
      font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--gray); cursor: pointer; padding: 6px 12px;
      border: 1px solid var(--border); border-radius: var(--radius);
      background: none; color: var(--gray); font-family: 'Inter', sans-serif;
      transition: color 0.2s, border-color 0.2s;
    }
    .logout-btn:hover { color: var(--danger); border-color: var(--danger); }
    .view-site-btn {
      font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--gold); padding: 6px 16px;
      border: 1px solid var(--gold); border-radius: var(--radius);
      background: none; font-family: 'Inter', sans-serif;
      text-decoration: none; transition: background 0.2s;
    }
    .view-site-btn:hover { background: var(--gold-dim); }

    /* MAIN */
    .admin-main { padding: clamp(24px, 4vw, 48px) clamp(16px, 4vw, 40px); max-width: 1200px; margin: 0 auto; }

    /* HEADER ROW */
    .admin-header {
      display: flex; justify-content: space-between; align-items: flex-end;
      flex-wrap: wrap; gap: 20px; margin-bottom: 40px;
    }
    .admin-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 40px; letter-spacing: 0.05em;
      line-height: 1;
    }
    .admin-title span { color: var(--gold); }
    .admin-count {
      font-size: 13px; color: var(--gray); margin-top: 4px;
    }

    /* ADD FORM */
    .add-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      margin-bottom: 40px;
    }
    .add-card-title {
      font-size: 14px; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--gold); margin-bottom: 24px;
      display: flex; align-items: center; gap: 8px;
    }
    .add-card-title::before {
      content: '+'; font-size: 18px; font-weight: 300;
    }
    .add-form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .add-form-grid .full { grid-column: 1 / -1; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-label {
      font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--gray);
    }
    .form-input {
      padding: 12px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--white); font-size: 14px; font-family: 'Inter', sans-serif;
      outline: none; transition: border-color 0.2s;
    }
    .form-input:focus { border-color: var(--gold); }
    .form-select {
      padding: 12px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--white); font-size: 14px; font-family: 'Inter', sans-serif;
      outline: none; cursor: pointer;
      -webkit-appearance: none;
    }
    .form-select:focus { border-color: var(--gold); }

    /* IMAGE UPLOAD DROP ZONE */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 32px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }
    .drop-zone:hover, .drop-zone.drag-over {
      border-color: var(--gold);
      background: var(--gold-dim);
    }
    .drop-zone input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer;
    }
    .drop-icon { font-size: 32px; margin-bottom: 10px; }
    .drop-text { font-size: 14px; color: var(--gray); }
    .drop-text strong { color: var(--gold); }
    .drop-preview {
      display: none;
      margin-top: 16px;
    }
    .drop-preview img {
      max-height: 160px; border-radius: var(--radius);
      margin: 0 auto; object-fit: cover;
    }
    .add-btn {
      padding: 13px 32px;
      background: var(--gold); color: var(--bg);
      border: none; border-radius: var(--radius);
      font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase;
      font-weight: 600; font-family: 'Inter', sans-serif;
      cursor: pointer; transition: background 0.2s, transform 0.15s;
    }
    .add-btn:hover:not(:disabled) { background: var(--gold-light); transform: translateY(-1px); }
    .add-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .add-btn.loading::after {
      content: ' ⟳';
      animation: spin 1s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* TOAST */
    .toast {
      position: fixed; bottom: 32px; right: 32px;
      padding: 14px 20px; border-radius: var(--radius);
      font-size: 14px; font-weight: 500;
      z-index: 999; opacity: 0; pointer-events: none;
      transition: opacity 0.3s, transform 0.3s;
      transform: translateY(8px);
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.success { background: var(--success); color: #fff; }
    .toast.error { background: var(--danger); color: #fff; }

    /* GALLERY GRID */
    .gallery-section-title {
      font-size: 14px; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--gray); margin-bottom: 20px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 16px;
    }
    .gallery-item {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      position: relative;
      transition: border-color 0.25s;
    }
    .gallery-item:hover { border-color: rgba(201,164,85,0.4); }
    .gallery-item img {
      width: 100%; height: 200px; object-fit: cover;
      display: block;
    }
    .gallery-item-info { padding: 14px; }
    .gallery-item-name {
      font-size: 14px; font-weight: 500; margin-bottom: 2px;
    }
    .gallery-item-type {
      font-size: 12px; color: var(--gold);
      text-transform: uppercase; letter-spacing: 0.15em;
    }
    .gallery-item-actions {
      display: flex; gap: 8px; margin-top: 12px;
    }
    .item-edit-btn, .item-delete-btn {
      flex: 1; padding: 8px;
      border: 1px solid var(--border); border-radius: 6px;
      background: none; color: var(--gray);
      font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase;
      font-family: 'Inter', sans-serif; cursor: pointer;
      transition: all 0.2s;
    }
    .item-edit-btn:hover {
      border-color: var(--gold); color: var(--gold);
      background: var(--gold-dim);
    }
    .item-delete-btn:hover {
      border-color: var(--danger); color: var(--danger);
      background: rgba(224,85,85,0.1);
    }

    /* EDIT MODAL */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 200;
      background: rgba(0,0,0,0.8);
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      opacity: 0; pointer-events: none; transition: opacity 0.25s;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px;
      width: 100%; max-width: 440px;
      transform: scale(0.96); transition: transform 0.25s;
    }
    .modal-overlay.open .modal-box { transform: scale(1); }
    .modal-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 24px; letter-spacing: 0.06em;
      margin-bottom: 24px;
    }
    .modal-actions {
      display: flex; gap: 12px; margin-top: 24px;
    }
    .modal-cancel {
      flex: 1; padding: 12px;
      border: 1px solid var(--border); border-radius: var(--radius);
      background: none; color: var(--gray);
      font-size: 13px; font-family: 'Inter', sans-serif; cursor: pointer;
      transition: all 0.2s;
    }
    .modal-cancel:hover { border-color: var(--gray); color: var(--white); }
    .modal-save {
      flex: 2; padding: 12px;
      background: var(--gold); color: var(--bg);
      border: none; border-radius: var(--radius);
      font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase;
      font-weight: 600; font-family: 'Inter', sans-serif; cursor: pointer;
      transition: background 0.2s;
    }
    .modal-save:hover { background: var(--gold-light); }

    /* EMPTY STATE */
    .empty-state {
      text-align: center; padding: 60px 20px;
      border: 1px dashed var(--border);
      border-radius: 12px; color: var(--gray);
    }
    .empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 15px; }

    /* LOADING STATE */
    .loading-state {
      text-align: center; padding: 40px;
      color: var(--gray); font-size: 14px;
    }

    @media (max-width: 600px) {
      .add-form-grid { grid-template-columns: 1fr; }
      .admin-header { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

  <!-- ─── LOGIN ─── -->
  <div id="loginScreen">
    <div class="login-box">
      <div class="login-logo">MALLY <span>ADMIN</span></div>
      <div class="login-sub">Gallery Management</div>
      <input type="password" id="passwordInput" class="login-field" placeholder="Enter admin password" autocomplete="current-password" />
      <button class="login-btn" id="loginBtn">Access Dashboard</button>
      <p class="login-error" id="loginError">Incorrect password. Try again.</p>
    </div>
  </div>

  <!-- ─── ADMIN PANEL ─── -->
  <div id="adminPanel">
    <!-- NAV -->
    <nav class="admin-nav">
      <div class="admin-nav-logo">MALLY <span>ADMIN</span></div>
      <div class="admin-nav-right">
        <span class="admin-badge">Gallery Manager</span>
        <a href="index.html" target="_blank" class="view-site-btn">View Site →</a>
        <button class="logout-btn" id="logoutBtn">Logout</button>
      </div>
    </nav>

    <div class="admin-main">
      <!-- HEADER -->
      <div class="admin-header">
        <div>
          <div class="admin-title">CUT <span>GALLERY</span></div>
          <div class="admin-count" id="itemCount">Loading gallery...</div>
        </div>
      </div>

      <!-- ADD NEW PHOTO FORM -->
      <div class="add-card">
        <div class="add-card-title">Add New Cut Photo</div>
        <div class="add-form-grid">
          <div class="form-group">
            <label class="form-label">Cut Name *</label>
            <input type="text" class="form-input" id="cutName" placeholder="e.g. Clean Fade" />
          </div>
          <div class="form-group">
            <label class="form-label">Cut Type / Service *</label>
            <select class="form-select" id="cutType">
              <option value="">Select service type...</option>
              <option value="Mens / Womens Haircut">Mens / Womens Haircut</option>
              <option value="Signature Haircut and Beard">Signature Haircut and Beard</option>
              <option value="Shape-Up">Shape-Up</option>
              <option value="Beard Shape-Up / Trim">Beard Shape-Up / Trim</option>
              <option value="Children Haircut">Children Haircut</option>
              <option value="Enhancements / Eye Brows">Enhancements / Eye Brows</option>
              <option value="Custom">Custom</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Description (optional)</label>
            <input type="text" class="form-input" id="cutDesc" placeholder="e.g. Low skin fade with defined edge" />
          </div>
          <div></div>
          <div class="form-group full">
            <label class="form-label">Photo *</label>
            <div class="drop-zone" id="dropZone">
              <input type="file" id="imageInput" accept="image/*" />
              <div class="drop-icon">📸</div>
              <div class="drop-text">Drop photo here or <strong>browse</strong></div>
              <div class="drop-text" style="font-size:12px;margin-top:4px;">JPG, PNG, WEBP — max 8MB</div>
              <div class="drop-preview" id="dropPreview">
                <img id="previewImg" src="" alt="Preview" />
              </div>
            </div>
          </div>
          <div class="form-group full" style="align-items:flex-start;">
            <button class="add-btn" id="addBtn">Upload &amp; Publish</button>
          </div>
        </div>
      </div>

      <!-- GALLERY GRID -->
      <div class="gallery-section-title">
        <span>Published Photos</span>
        <span id="liveLabel" style="font-size:11px;color:var(--success);">● Live on site</span>
      </div>
      <div id="galleryGrid" class="loading-state">Loading photos...</div>
    </div>
  </div>

  <!-- ─── EDIT MODAL ─── -->
  <div class="modal-overlay" id="editModal">
    <div class="modal-box">
      <div class="modal-title">EDIT CUT</div>
      <input type="hidden" id="editId" />
      <div class="form-group" style="margin-bottom:14px;">
        <label class="form-label">Cut Name</label>
        <input type="text" class="form-input" id="editName" />
      </div>
      <div class="form-group" style="margin-bottom:14px;">
        <label class="form-label">Cut Type / Service</label>
        <select class="form-select" id="editType">
          <option value="Mens / Womens Haircut">Mens / Womens Haircut</option>
          <option value="Signature Haircut and Beard">Signature Haircut and Beard</option>
          <option value="Shape-Up">Shape-Up</option>
          <option value="Beard Shape-Up / Trim">Beard Shape-Up / Trim</option>
          <option value="Children Haircut">Children Haircut</option>
          <option value="Enhancements / Eye Brows">Enhancements / Eye Brows</option>
          <option value="Custom">Custom</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <input type="text" class="form-input" id="editDesc" />
      </div>
      <div class="modal-actions">
        <button class="modal-cancel" id="editCancel">Cancel</button>
        <button class="modal-save" id="editSave">Save Changes</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div class="toast" id="toast"></div>

  <script>
    const ADMIN_PW = 'mals2025';
    let sessionActive = false;
    let galleryItems = [];

    // ─── AUTH ──────────────────────────────────────────────────────────────
    function checkSession() {
      return sessionStorage.getItem('mally_admin') === 'true';
    }
    function login() {
      const pw = document.getElementById('passwordInput').value;
      if (pw === ADMIN_PW) {
        sessionStorage.setItem('mally_admin', 'true');
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'block';
        loadGallery();
      } else {
        document.getElementById('loginError').classList.add('show');
        document.getElementById('passwordInput').style.borderColor = '#E05555';
        setTimeout(() => {
          document.getElementById('loginError').classList.remove('show');
          document.getElementById('passwordInput').style.borderColor = '';
        }, 3000);
      }
    }
    document.getElementById('loginBtn').addEventListener('click', login);
    document.getElementById('passwordInput').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
    document.getElementById('logoutBtn').addEventListener('click', () => {
      sessionStorage.removeItem('mally_admin');
      location.reload();
    });

    // Auto-login if session exists
    if (checkSession()) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminPanel').style.display = 'block';
      loadGallery();
    }

    // ─── TOAST ─────────────────────────────────────────────────────────────
    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast ${type} show`;
      setTimeout(() => t.classList.remove('show'), 3500);
    }

    // ─── IMAGE PREVIEW ─────────────────────────────────────────────────────
    let selectedFile = null;
    const dropZone = document.getElementById('dropZone');
    const imageInput = document.getElementById('imageInput');
    const dropPreview = document.getElementById('dropPreview');
    const previewImg = document.getElementById('previewImg');

    function handleFile(file) {
      if (!file || !file.type.startsWith('image/')) return;
      selectedFile = file;
      const reader = new FileReader();
      reader.onload = e => {
        previewImg.src = e.target.result;
        dropPreview.style.display = 'block';
        dropZone.querySelector('.drop-icon').style.display = 'none';
      };
      reader.readAsDataURL(file);
    }
    imageInput.addEventListener('change', e => handleFile(e.target.files[0]));
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      handleFile(e.dataTransfer.files[0]);
    });

    // ─── LOAD GALLERY ──────────────────────────────────────────────────────
    async function loadGallery() {
      const grid = document.getElementById('galleryGrid');
      grid.className = 'loading-state';
      grid.innerHTML = 'Loading photos...';
      try {
        const res = await fetch('/api/gallery');
        galleryItems = await res.json();
        renderGallery();
      } catch (e) {
        // Show demo items if API not available yet (pre-Blob-setup)
        galleryItems = getDemoItems();
        renderGallery();
        document.getElementById('liveLabel').textContent = '⚠ API not connected — see setup instructions';
        document.getElementById('liveLabel').style.color = '#E5C97A';
      }
    }

    function getDemoItems() {
      return [
        { id: 'demo1', name: 'Clean Fade', type: 'Shape-Up', description: 'Demo photo — replace with real cuts', imageUrl: 'https://images.unsplash.com/photo-1503951914875-452162b0f3f1?w=400&q=80' },
        { id: 'demo2', name: 'Signature Cut', type: 'Signature Haircut and Beard', description: 'Demo photo', imageUrl: 'https://images.unsplash.com/photo-1621605815971-fbc98d665033?w=400&q=80' },
        { id: 'demo3', name: 'Beard Trim', type: 'Beard Shape-Up / Trim', description: 'Demo photo', imageUrl: 'https://images.unsplash.com/photo-1599351431202-1e0f0137899a?w=400&q=80' },
      ];
    }

    function renderGallery() {
      const grid = document.getElementById('galleryGrid');
      document.getElementById('itemCount').textContent = `${galleryItems.length} photo${galleryItems.length !== 1 ? 's' : ''} published`;

      if (!galleryItems.length) {
        grid.className = '';
        grid.innerHTML = `<div class="empty-state"><div class="empty-icon">📷</div><p>No photos yet. Add your first cut above.</p></div>`;
        return;
      }

      grid.className = 'gallery-grid';
      grid.innerHTML = galleryItems.map(item => `
        <div class="gallery-item" data-id="${item.id}">
          <img src="${item.imageUrl}" alt="${item.name}" loading="lazy" onerror="this.src='https://via.placeholder.com/300x200/161616/C9A455?text=Image+Error'" />
          <div class="gallery-item-info">
            <div class="gallery-item-name">${item.name}</div>
            <div class="gallery-item-type">${item.type}</div>
            ${item.description ? `<div style="font-size:12px;color:var(--gray);margin-top:4px;">${item.description}</div>` : ''}
            <div class="gallery-item-actions">
              <button class="item-edit-btn" onclick="openEdit('${item.id}')">✏ Edit</button>
              <button class="item-delete-btn" onclick="deleteItem('${item.id}')">✕ Delete</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    // ─── ADD NEW ITEM ──────────────────────────────────────────────────────
    document.getElementById('addBtn').addEventListener('click', async () => {
      const name = document.getElementById('cutName').value.trim();
      const type = document.getElementById('cutType').value;
      const desc = document.getElementById('cutDesc').value.trim();

      if (!name) return showToast('Please enter a cut name', 'error');
      if (!type) return showToast('Please select a cut type', 'error');
      if (!selectedFile) return showToast('Please select a photo', 'error');

      const btn = document.getElementById('addBtn');
      btn.disabled = true; btn.classList.add('loading');
      btn.textContent = 'Uploading...';

      try {
        // Convert image to base64
        const base64 = await fileToBase64(selectedFile);

        const res = await fetch('/api/gallery', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            password: ADMIN_PW,
            name, type, description: desc,
            imageBase64: base64,
            imageType: selectedFile.type,
          }),
        });

        if (!res.ok) throw new Error('Upload failed');

        const newItem = await res.json();
        galleryItems.unshift(newItem);
        renderGallery();
        showToast('✓ Photo published to site!', 'success');

        // Reset form
        document.getElementById('cutName').value = '';
        document.getElementById('cutType').value = '';
        document.getElementById('cutDesc').value = '';
        selectedFile = null;
        previewImg.src = '';
        dropPreview.style.display = 'none';
        dropZone.querySelector('.drop-icon').style.display = 'block';

      } catch (e) {
        showToast('Upload failed — is Vercel Blob connected?', 'error');
      } finally {
        btn.disabled = false; btn.classList.remove('loading');
        btn.textContent = 'Upload & Publish';
      }
    });

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = e => resolve(e.target.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    // ─── DELETE ────────────────────────────────────────────────────────────
    async function deleteItem(id) {
      if (!confirm('Delete this photo from the gallery?')) return;
      try {
        const res = await fetch('/api/gallery', {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: ADMIN_PW, id }),
        });
        if (!res.ok) throw new Error();
        galleryItems = galleryItems.filter(i => i.id !== id);
        renderGallery();
        showToast('Photo removed', 'success');
      } catch {
        showToast('Delete failed', 'error');
      }
    }

    // ─── EDIT MODAL ────────────────────────────────────────────────────────
    function openEdit(id) {
      const item = galleryItems.find(i => i.id === id);
      if (!item) return;
      document.getElementById('editId').value = id;
      document.getElementById('editName').value = item.name;
      document.getElementById('editType').value = item.type;
      document.getElementById('editDesc').value = item.description || '';
      document.getElementById('editModal').classList.add('open');
    }
    document.getElementById('editCancel').addEventListener('click', () => {
      document.getElementById('editModal').classList.remove('open');
    });
    document.getElementById('editModal').addEventListener('click', e => {
      if (e.target === document.getElementById('editModal'))
        document.getElementById('editModal').classList.remove('open');
    });
    document.getElementById('editSave').addEventListener('click', async () => {
      const id = document.getElementById('editId').value;
      const name = document.getElementById('editName').value.trim();
      const type = document.getElementById('editType').value;
      const description = document.getElementById('editDesc').value.trim();
      if (!name) return showToast('Name required', 'error');

      try {
        const res = await fetch('/api/gallery', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: ADMIN_PW, id, name, type, description }),
        });
        if (!res.ok) throw new Error();
        const updated = await res.json();
        const idx = galleryItems.findIndex(i => i.id === id);
        if (idx !== -1) galleryItems[idx] = updated;
        renderGallery();
        document.getElementById('editModal').classList.remove('open');
        showToast('✓ Updated live on site!', 'success');
      } catch {
        showToast('Update failed', 'error');
      }
    });
  </script>
</body>
</html>
